name: Deploy to SunilDev

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'force-app/**'
      - 'packaged-src/**'
      - 'manifest/**'
      - 'sfdx-project.json'
      - '.github/workflows/**'
      - 'create_packaged_src.ps1'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Verify CLI
        run: sf --version

      - name: Authenticate Salesforce Org
        shell: bash
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias SunilDev --set-default
          rm ./SFDX_AUTH_URL.txt
      - name: Prepare Packaged Source
        run: |
          mkdir -p packaged-src/main/default/lwc
          mkdir -p packaged-src/main/default/classes
          # Copy LWCs
          for lwc in admissionManager attendance attendanceReport bulkStudentImport complaintbox eduProDashboard enterMarks expenseManagement gradesModule payTheBill priceBookSetup schoolSetup student studentPromotion teacherandClassmanagement schoolstaff assignedClasses; do
            if [ -d "force-app/main/default/lwc/$lwc" ]; then
              cp -r "force-app/main/default/lwc/$lwc" packaged-src/main/default/lwc/
            fi
          done
          # Copy Apex Classes
          for cls in AdmissionController StudentController MarksheetController ClassManagementController AddFeesController ComplaintBox ExpenseController SchoolStaffController AttendanceReportController AttendanceController EduProDashboardController GradesController EnterMarksController SchoolSetupController NamespaceUtils TestDataFactory PromotionController AcademicYearTriggerTest PricebookAutomationHandler AdmissionInvoiceController InvoicePDFController; do
            if [ -f "force-app/main/default/classes/$cls.cls" ]; then
              cp "force-app/main/default/classes/$cls.cls" packaged-src/main/default/classes/
              cp "force-app/main/default/classes/$cls.cls-meta.xml" packaged-src/main/default/classes/
            fi
            if [ -f "force-app/main/default/classes/${cls}Test.cls" ]; then
              cp "force-app/main/default/classes/${cls}Test.cls" packaged-src/main/default/classes/
              cp "force-app/main/default/classes/${cls}Test.cls-meta.xml" packaged-src/main/default/classes/
            fi
          done
          # Copy other folders
          for f in applications tabs permissionsets staticresources objects flexipages layouts triggers pages standardValueSets; do
            if [ -d "force-app/main/default/$f" ]; then
              cp -r "force-app/main/default/$f" packaged-src/main/default/
            fi
          done
          # Cleanups
          rm -f packaged-src/main/default/objects/Product2/fields/UnitOfMeasureId.field-meta.xml
          rm -f packaged-src/main/default/objects/Pricebook2/fields/CostBookId.field-meta.xml
          # Cleanup standard__ / sfdcInternalInt__ files
          find packaged-src/main/default/applications -name "standard__*" -delete 2>/dev/null || true
          find packaged-src/main/default/applications -name "sfdcInternalInt__*" -delete 2>/dev/null || true
          find packaged-src/main/default/permissionsets -name "standard__*" -delete 2>/dev/null || true
          find packaged-src/main/default/permissionsets -name "sfdcInternalInt__*" -delete 2>/dev/null || true
      - name: Deploy Source to Target Org
        run: |
          sf project deploy start \
            --source-dir packaged-src \
            --target-org SunilDev \
            --wait 30 > deploy-log.txt 2>&1
      - name: Print and Push Deployment Logs on Failure
        if: failure()
        shell: pwsh
        run: |
          Get-Content deploy-log.txt
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f deploy-log.txt
          git commit -m "Add failing deployment logs [skip ci]"
          git checkout -b diagnostic-logs 2>/dev/null || git checkout diagnostic-logs
          git push origin diagnostic-logs --force
