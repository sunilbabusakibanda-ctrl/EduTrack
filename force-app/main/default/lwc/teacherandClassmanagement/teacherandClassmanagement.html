<template>
    <lightning-card class="premium-card">
        <div slot="title" class="card-header">
            <lightning-icon icon-name="standard:education" size="small" class="header-icon"></lightning-icon>
            <h1 class="card-title">Teacher &amp; Class Management</h1>
        </div>

        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
            </div>
        </template>

        <div class="premium-container">

            <!-- ═══════════════════════════════════
                 STEP 0: DASHBOARD LANDING
                 ═══════════════════════════════════ -->
            <template if:true={isStep0}>
                <template if:false={showTeacherForm}>

                    <!-- Top Action Row -->
                    <div class="landing-action-row">
                        <div>
                            <h2 class="dash-title">Workload Overview</h2>
                            <p class="dash-subtitle">Live teacher &amp; class assignment dashboard</p>
                        </div>
                        <div class="action-btn-group">
                            <button class="action-pill action-pill-primary" onclick={handleToggleTeacherForm}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Add Teacher
                            </button>
                            <button class="action-pill action-pill-primary" onclick={handleOpenImportTeachers}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
                                Import Teachers
                            </button>
                            <button class="action-pill action-pill-primary" onclick={handleOpenImportSubjects}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
                                Add Subject
                            </button>
                            <button class="action-pill action-pill-secondary" onclick={handleOpenCreateClass}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                Create Class
                            </button>
                            <button class="action-pill action-pill-secondary" onclick={handleOpenCreateSection}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                Create Section
                            </button>
                            <button class="action-pill action-pill-timetable action-pill-primary" onclick={handleSkipTeacherCreation}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Add Class Section
                            </button>
                            <button class="action-pill action-pill-timetable" onclick={handleOpenTimetable}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Timetable
                            </button>
                        </div>
                    </div>

                    <!-- KPI Strip -->
                    <div class="kpi-strip">
                        <div class="kpi-card kpi-blue">
                            <div class="kpi-icon-wrap kpi-icon-blue">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            </div>
                            <div class="kpi-data">
                                <span class="kpi-val">{workloadSummary.totalTeachers}</span>
                                <span class="kpi-label">Total Teachers</span>
                            </div>
                        </div>
                        <div class="kpi-card kpi-green">
                            <div class="kpi-icon-wrap kpi-icon-green">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            </div>
                            <div class="kpi-data">
                                <span class="kpi-val">{workloadSummary.totalClasses}</span>
                                <span class="kpi-label">Class Sections</span>
                            </div>
                        </div>
                        <div class="kpi-card kpi-purple">
                            <div class="kpi-icon-wrap kpi-icon-purple">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            </div>
                            <div class="kpi-data">
                                <span class="kpi-val">{workloadSummary.totalAssignments}</span>
                                <span class="kpi-label">Assignments</span>
                            </div>
                        </div>
                        <div class="kpi-card kpi-amber">
                            <div class="kpi-icon-wrap kpi-icon-amber">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </div>
                            <div class="kpi-data">
                                <span class="kpi-val">{workloadSummary.avgLoadPercent}%</span>
                                <span class="kpi-label">Avg Workload</span>
                            </div>
                        </div>
                    </div>

                    <!-- Dual Panel -->
                    <div class="dual-panel">

                        <!-- LEFT: Teacher Workload -->
                        <div class="panel">
                            <div class="panel-header">
                                <div class="panel-title-row">
                                    <span class="panel-accent panel-accent-blue"></span>
                                    <h3 class="panel-title">Teacher Workload</h3>
                                    <span class="panel-badge">{teacherWorkloadList.length}</span>
                                </div>
                                <div class="panel-searchbox">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                    <input type="text" placeholder="Search teachers…" value={teacherSearchTerm} onchange={handleTeacherSearch} class="panel-search-input"/>
                                </div>
                            </div>

                            <div class="panel-list">
                                <template if:true={hasTeacherWorkload}>
                                    <template for:each={filteredTeacherWorkload} for:item="teacher">
                                        <div key={teacher.id} class={teacher.rowClass} data-id={teacher.id} onclick={handleSelectTeacher}>
                                            <div class="tw-avatar" style={teacher.avatarStyle}><span class="avatar-initials">{teacher.initials}</span><img src={teacher.avatarImg} alt={teacher.initials} class="avatar-img"/></div>
                                            <div class="tw-body">
                                                <div class="tw-top">
                                                    <span class="tw-name">{teacher.name}</span>
                                                    <span class="tw-load-chip" style={teacher.chipStyle}>{teacher.loadPercent}%</span>
                                                </div>
                                                <div class="tw-meta">{teacher.subjectCount} subject(s) &bull; {teacher.classCount} class(es)</div>
                                                <div class="tw-bar-track">
                                                    <div class="tw-bar-fill" style={teacher.barStyle}></div>
                                                </div>
                                            </div>
                                            <svg class="tw-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                                        </div>

                                        <!-- ── Teacher Detail Drawer ── -->
                                        <template if:true={teacher.isSelected}>
                                            <div key={teacher.id} class="detail-drawer inline-detail-drawer">
                                                <template if:false={selectedTeacherDetail}>
                                                    <div class="dd-loading-row">
                                                        <div class="dd-loading-spinner">
                                                            <lightning-spinner alternative-text="Loading" size="small" variant="brand"></lightning-spinner>
                                                        </div>
                                                        <span class="dd-loading-text">Loading assignments…</span>
                                                    </div>
                                                </template>
                                                <template if:true={selectedTeacherDetail}>

                                                    <!-- ══ WEEKLY SCHEDULE — Collapsible Header ══ -->
                                                    <div class="tt-weekly-schedule-heading collapsible-heading"
                                                         data-teacher-id={selectedTeacherDetail.id}
                                                         onclick={handleToggleWeeklySchedule}>
                                                        <div class="tt-ws-icon">
                                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                        </div>
                                                        <div class="tt-ws-text">
                                                            <span class="tt-ws-label">Weekly Schedule</span>
                                                            <span class="tt-ws-sublabel">Today's timetable — {todayDayName}</span>
                                                        </div>
                                                        <!-- Chevron rotates when expanded -->
                                                        <div class="collapsible-chevron-wrap">
                                                            <template if:true={selectedTeacherDetail.isWeeklyExpanded}>
                                                                <svg class="collapsible-chevron collapsible-chevron-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
                                                            </template>
                                                            <template if:false={selectedTeacherDetail.isWeeklyExpanded}>
                                                                <svg class="collapsible-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                                                            </template>
                                                        </div>
                                                    </div>

                                                    <!-- ══ Weekly Schedule Body (collapsible) ══ -->
                                                    <template if:true={selectedTeacherDetail.isWeeklyExpanded}>
                                                        <div class="dd-header">
                                                            <div class="dd-avatar" style={teacher.avatarStyle}><span class="avatar-initials">{teacher.initials}</span><img src={teacher.avatarImg} alt={teacher.initials} class="avatar-img"/></div>
                                                            <div class="dd-info">
                                                                <h4 class="dd-name">{teacher.name}</h4>
                                                                <p class="dd-sub">{selectedTeacherDetail.totalAssignments} assignments across {selectedTeacherDetail.classCount} class(es)</p>
                                                            </div>
                                                            <div class="dd-ring-wrap">
                                                                <svg viewBox="0 0 56 56" class="dd-ring-svg">
                                                                    <circle cx="28" cy="28" r="22" class="ring-track"/>
                                                                    <circle cx="28" cy="28" r="22" class="ring-prog" style={selectedTeacherDetail.ringStyle}/>
                                                                </svg>
                                                                <span class="dd-ring-label">{teacher.loadPercent}%</span>
                                                            </div>
                                                            <button class="dd-close" onclick={handleClearTeacherDetail}>
                                                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                                            </button>
                                                        </div>

                                                        <!-- Assignments section -->
                                                        <div class="dd-body">
                                                            <template for:each={selectedTeacherDetail.allSubjects} for:item="subj">
                                                                <div key={subj.uniqueKey} class="dd-subj-row">
                                                                    <span class="dd-subj-dot"></span>
                                                                    <div class="dd-subj-info">
                                                                        <span class="dd-subj-name">{subj.subjectName}</span>
                                                                        <span class="dd-subj-class-tag">{subj.className}</span>
                                                                    </div>
                                                                    <span class="dd-periods-chip" title={subj.periodsChipTitle}>{subj.periodsPerWeek} p/wk</span>
                                                                    <div class="dd-row-actions">
                                                                        <button class="icon-btn icon-btn-edit"
                                                                            data-assignment-id={subj.assignmentId}
                                                                            data-subject-id={subj.subjectId}
                                                                            data-subject-name={subj.subjectName}
                                                                            data-teacher-id={selectedTeacherDetail.id}
                                                                            data-teacher-name={teacher.name}
                                                                            onclick={handleOpenReassign}>
                                                                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                                                        </button>
                                                                        <button class="icon-btn icon-btn-del"
                                                                            data-assignment-id={subj.assignmentId}
                                                                            onclick={handleDeleteAssignment}>
                                                                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </template>

                                                            <!-- Show teacher skills when no assignments -->
                                                            <template if:true={selectedTeacherDetail.hasNoSubjects}>
                                                                <template if:true={selectedTeacherDetail.hasSkills}>
                                                                    <div class="dd-skills-section">
                                                                        <div class="dd-skills-heading">
                                                                            <div class="dd-skills-heading-icon">
                                                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                                                            </div>
                                                                            <span class="dd-skills-heading-text">Subject Skills</span>
                                                                        </div>
                                                                        <div class="dd-skills-list">
                                                                            <template for:each={selectedTeacherDetail.teacherSkillsList} for:item="skill">
                                                                                <div key={skill.id} class="dd-skill-row">
                                                                                    <span class="dd-skill-subject">{skill.subjectName}</span>
                                                                                    <span class={skill.levelClass}>{skill.skillLevel}</span>
                                                                                    <template if:true={skill.yearsOfExperience}>
                                                                                        <span class="dd-skill-exp">{skill.yearsOfExperience} yrs</span>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                                <template if:false={selectedTeacherDetail.hasSkills}>
                                                                    <div class="dd-no-skills-note">
                                                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                                        No assignments or skills found for this teacher.
                                                                    </div>
                                                                </template>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    <!-- /Weekly Schedule body -->

                                                    <!-- ══ TODAY'S SCHEDULE — Collapsible Header ══ -->
                                                    <template if:true={selectedTeacherDetail.hasTimetable}>
                                                        <div class="tt-drawer-section">

                                                            <!-- Collapsible "Today's Schedule" header -->
                                                            <div class="tt-drawer-header collapsible-heading tt-collapsible-today"
                                                                 data-teacher-id={selectedTeacherDetail.id}
                                                                 onclick={handleToggleTodaySchedule}>
                                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                                <span class="tt-drawer-title">Today's Schedule ({todayDayName})</span>

                                                                <template if:true={selectedTeacherDetail.hasLeaserToday}>
                                                                    <span class="leaser-legend-badge">
                                                                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                                        Has Leaser Period
                                                                    </span>
                                                                </template>
                                                                <template if:true={selectedTeacherDetail.hasFreeToday}>
                                                                    <span class="leaser-legend-badge leaser-legend-badge-free">
                                                                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/></svg>
                                                                        Has Free Period
                                                                    </span>
                                                                </template>

                                                                <!-- Chevron -->
                                                                <div class="collapsible-chevron-wrap collapsible-chevron-ml-auto">
                                                                    <template if:true={selectedTeacherDetail.isTodayExpanded}>
                                                                        <svg class="collapsible-chevron collapsible-chevron-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
                                                                    </template>
                                                                    <template if:false={selectedTeacherDetail.isTodayExpanded}>
                                                                        <svg class="collapsible-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                                                                    </template>
                                                                </div>
                                                            </div>

                                                            <!-- Today's Schedule body (collapsible) -->
                                                            <template if:true={selectedTeacherDetail.isTodayExpanded}>
                                                                <template for:each={selectedTeacherDetail.timetablePeriods} for:item="dayRow">
                                                                    <div key={dayRow.day} class="tt-day-group">
                                                                        <div class="tt-day-label-bar">
                                                                            <span class="tt-day-pill">{dayRow.dayShort}</span>
                                                                            <span class="tt-day-full">{dayRow.day}</span>
                                                                            <template if:true={dayRow.leaserCount}>
                                                                                <span class="leaser-day-count">{dayRow.leaserCount} leaser</span>
                                                                            </template>
                                                                        </div>
                                                                        <div class="tt-period-chips">
                                                                            <template for:each={dayRow.periods} for:item="period">
                                                                                <!-- LEASER / FREE period card -->
                                                                                <template if:true={period.isLeaser}>
                                                                                    <div key={period.key}
                                                                                         class={period.leaserCardClass}
                                                                                         onclick={handlePeriodCardClick}
                                                                                         data-class-section-id={period.classSectionId}
                                                                                         data-academic-year-id={period.academicYearId}
                                                                                         data-start-date={period.startDate}
                                                                                         data-end-date={period.endDate}
                                                                                         data-frequency={period.frequency}
                                                                                         title={period.leaserCardTitle}>
                                                                                        <div class={period.leaserRibbonClass}>
                                                                                            <template if:true={period.isFreeLeaser}>
                                                                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/></svg>
                                                                                            </template>
                                                                                            <template if:false={period.isFreeLeaser}>
                                                                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                                                            </template>
                                                                                            {period.leaserType}
                                                                                        </div>
                                                                                        <div class="tt-pc-top">
                                                                                            <span class="tt-pc-num tt-pc-num-leaser">P{period.periodNumber}</span>
                                                                                            <span class="tt-pc-time">{period.timeLabel}</span>
                                                                                        </div>
                                                                                        <div class="tt-pc-subject tt-pc-subject-leaser">{period.subjectName}</div>
                                                                                        <div class="tt-pc-teacher leaser-sub-row">
                                                                                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                                                                            {period.className}
                                                                                        </div>
                                                                                        <template if:true={period.substituteTeacher}>
                                                                                            <div class="leaser-sub-teacher">
                                                                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                                                                                Sub: {period.substituteTeacher}
                                                                                            </div>
                                                                                        </template>
                                                                                        <div class="tt-pc-edit-hint leaser-edit-hint">✏ Edit</div>
                                                                                    </div>
                                                                                </template>

                                                                                <!-- NORMAL period card -->
                                                                                <template if:false={period.isLeaser}>
                                                                                    <div key={period.key}
                                                                                         class="tt-period-card tt-period-card-clickable"
                                                                                         onclick={handlePeriodCardClick}
                                                                                         data-class-section-id={period.classSectionId}
                                                                                         data-academic-year-id={period.academicYearId}
                                                                                         data-start-date={period.startDate}
                                                                                         data-end-date={period.endDate}
                                                                                         data-frequency={period.frequency}
                                                                                         title="Click to edit timetable">
                                                                                        <div class="tt-pc-top">
                                                                                            <span class="tt-pc-num">P{period.periodNumber}</span>
                                                                                            <span class="tt-pc-time">{period.timeLabel}</span>
                                                                                        </div>
                                                                                        <div class="tt-pc-subject">{period.subjectName}</div>
                                                                                        <div class="tt-pc-teacher">
                                                                                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                                                                            {period.className}
                                                                                        </div>
                                                                                        <div class="tt-pc-edit-hint">✏ Edit</div>
                                                                                    </div>
                                                                                </template>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </template>
                                                            <!-- /Today's Schedule body -->

                                                        </div>
                                                    </template>
                                                    <template if:false={selectedTeacherDetail.hasTimetable}>
                                                        <div class="tt-drawer-empty">
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                            <span>No timetable periods scheduled yet</span>
                                                        </div>
                                                    </template>

                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </template>
                                <template if:false={hasTeacherWorkload}>
                                    <div class="panel-empty">
                                        <div class="pe-emoji">👤</div>
                                        <p class="pe-text">No teachers added yet</p>
                                        <p class="pe-hint">Click "Add Teacher" to get started</p>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- RIGHT: Class Workload -->
                        <div class="panel">
                            <div class="panel-header">
                                <div class="panel-title-row">
                                    <span class="panel-accent panel-accent-green"></span>
                                    <h3 class="panel-title">Class Workload</h3>
                                    <span class="panel-badge panel-badge-green">{classWorkloadList.length}</span>
                                </div>
                                <div class="panel-searchbox">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                    <input type="text" placeholder="Search classes…" value={classSearchTerm} onchange={handleClassSearch} class="panel-search-input"/>
                                </div>
                            </div>

                            <div class="panel-list">
                                <template if:true={hasClassWorkload}>
                                    <template for:each={filteredClassWorkload} for:item="cls">
                                        <div key={cls.id} class={cls.rowClass} data-id={cls.id} onclick={handleSelectClass}>
                                            <div class="cw-icon-bg">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                                            </div>
                                            <div class="tw-body">
                                                <div class="tw-top">
                                                    <span class="tw-name">{cls.name}</span>
                                                    <span class="cw-year-tag">{cls.academicYear}</span>
                                                </div>
                                                <div class="tw-meta">{cls.subjectCount} subjects &bull; {cls.staffedCount} staffed &bull; {cls.unstaffedCount} open</div>
                                                <div class="tw-bar-track">
                                                    <div class="tw-bar-fill" style={cls.barStyle}></div>
                                                </div>
                                            </div>
                                            <div class="cw-pct-badge" style={cls.badgeStyle}>{cls.loadPercent}%</div>
                                            <svg class="tw-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                                        </div>

                                        <!-- ── Class Detail Drawer ── -->
                                        <template if:true={cls.isSelected}>
                                            <div key={cls.id} class="detail-drawer detail-drawer-green inline-detail-drawer">
                                                <template if:false={selectedClassDetail}>
                                                    <div class="dd-loading-row">
                                                        <div class="dd-loading-spinner">
                                                            <lightning-spinner alternative-text="Loading" size="small" variant="brand"></lightning-spinner>
                                                        </div>
                                                        <span class="dd-loading-text">Loading class details…</span>
                                                    </div>
                                                </template>
                                                <template if:true={selectedClassDetail}>
                                                    <div class="dd-header">
                                                        <div class="dd-class-icon">
                                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                                                        </div>
                                                        <div class="dd-info">
                                                            <h4 class="dd-name">{selectedClassDetail.name}</h4>
                                                            <p class="dd-sub">{selectedClassDetail.academicYear} &bull; {selectedClassDetail.subjectCount} subjects &bull; {selectedClassDetail.teacherCount} teachers</p>
                                                        </div>
                                                        <div class="dd-ring-wrap">
                                                            <svg viewBox="0 0 56 56" class="dd-ring-svg">
                                                                <circle cx="28" cy="28" r="22" class="ring-track"/>
                                                                <circle cx="28" cy="28" r="22" class="ring-prog ring-prog-green" style={selectedClassDetail.ringStyle}/>
                                                            </svg>
                                                            <span class="dd-ring-label">{selectedClassDetail.loadPercent}%</span>
                                                        </div>
                                                        <button class="dd-close" onclick={handleClearClassDetail}>
                                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                                        </button>
                                                    </div>
                                                    <div class="class-coverage-bar">
                                                        <div class="ccb-labels">
                                                            <span>Staffing Coverage</span>
                                                            <span class="ccb-pct">{selectedClassDetail.loadPercent}% staffed</span>
                                                        </div>
                                                        <div class="ccb-track"><div class="ccb-fill" style={selectedClassDetail.progressStyle}></div></div>
                                                    </div>

                                                    <div class="dd-body">
                                                        <template for:each={selectedClassDetail.subjects} for:item="subj">
                                                            <div key={subj.subjectId} class="cd-subj-block">
                                                                <div class="cd-subj-header">
                                                                    <div class="cd-dot" style={subj.dotStyle}></div>
                                                                    <span class="cd-subj-name">{subj.subjectName}</span>
                                                                    <template if:true={subj.hasTeacher}>
                                                                        <span class="status-tag status-green">Assigned</span>
                                                                    </template>
                                                                    <template if:false={subj.hasTeacher}>
                                                                        <span class="status-tag status-red">Open</span>
                                                                    </template>
                                                                    <div class="cd-mini-bar"><div class="cd-mini-fill" style={subj.barStyle}></div></div>
                                                                    <span class="cd-pct">{subj.loadPercent}%</span>
                                                                </div>
                                                                <div class="cd-teachers">
                                                                    <template for:each={subj.teachers} for:item="t">
                                                                        <div key={t.id} class="cd-teacher-row">
                                                                            <div class="cd-t-avatar" style={t.avatarStyle}>{t.initials}</div>
                                                                            <span class="cd-t-name">{t.name}</span>
                                                                            <span class="cd-t-periods" title={t.periodsChipTitle}>{t.periodsPerWeek} p/wk</span>
                                                                            <span class="cd-t-pct">{t.loadPercent}%</span>
                                                                            <button class="icon-btn icon-btn-edit"
                                                                                data-assignment-id={t.assignmentId}
                                                                                data-subject-id={subj.subjectId}
                                                                                data-subject-name={subj.subjectName}
                                                                                data-teacher-id={t.id}
                                                                                data-teacher-name={t.name}
                                                                                onclick={handleOpenReassign}>
                                                                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                                                            </button>
                                                                        </div>
                                                                    </template>
                                                                    <template if:false={subj.hasTeacher}>
                                                                        <div class="cd-empty-row">No teacher assigned yet</div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>

                                                    <!-- ── Timetable Periods Section (Class) — Collapsible ── -->
                                                    <template if:true={selectedClassDetail.hasTimetable}>
                                                        <div class="tt-drawer-section tt-drawer-section-green">

                                                            <!-- Collapsible header -->
                                                            <div class="tt-drawer-header collapsible-heading tt-collapsible-today tt-collapsible-today-green"
                                                                 data-class-id={selectedClassDetail.id}
                                                                 onclick={handleToggleClassTodaySchedule}>
                                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                                <span class="tt-drawer-title">Today's Schedule ({todayDayName})</span>
                                                                <template if:true={selectedClassDetail.hasSubToday}>
                                                                    <span class="leaser-legend-badge leaser-legend-badge-green">
                                                                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                                                        Has Substitute
                                                                    </span>
                                                                </template>

                                                                <!-- Chevron -->
                                                                <div class="collapsible-chevron-wrap collapsible-chevron-ml-auto">
                                                                    <template if:true={selectedClassDetail.isTodayExpanded}>
                                                                        <svg class="collapsible-chevron collapsible-chevron-open collapsible-chevron-green" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
                                                                    </template>
                                                                    <template if:false={selectedClassDetail.isTodayExpanded}>
                                                                        <svg class="collapsible-chevron collapsible-chevron-green" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                                                                    </template>
                                                                </div>
                                                            </div>

                                                            <!-- Today's Schedule body for class (collapsible) -->
                                                            <template if:true={selectedClassDetail.isTodayExpanded}>
                                                                <template for:each={selectedClassDetail.timetablePeriods} for:item="dayRow">
                                                                    <div key={dayRow.day} class="tt-day-group">
                                                                        <div class="tt-day-label-bar">
                                                                            <span class="tt-day-pill tt-day-pill-green">{dayRow.dayShort}</span>
                                                                            <span class="tt-day-full">{dayRow.day}</span>
                                                                            <template if:true={dayRow.subCount}>
                                                                                <span class="leaser-day-count leaser-day-count-green">{dayRow.subCount} sub</span>
                                                                            </template>
                                                                        </div>
                                                                        <div class="tt-period-chips">
                                                                            <template for:each={dayRow.periods} for:item="p">
                                                                                <template if:true={p.isSubstitute}>
                                                                                    <div key={p.key}
                                                                                         class="tt-period-card tt-period-card-green tt-period-card-sub tt-period-card-clickable"
                                                                                         onclick={handlePeriodCardClick}
                                                                                         data-class-section-id={p.classSectionId}
                                                                                         data-academic-year-id={p.academicYearId}
                                                                                         data-start-date={p.startDate}
                                                                                         data-end-date={p.endDate}
                                                                                         data-frequency={p.frequency}
                                                                                         title="Substitute teacher covering — original teacher on leave">
                                                                                        <div class="leaser-ribbon leaser-ribbon-sub">
                                                                                            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                                                                            SUB
                                                                                        </div>
                                                                                        <div class="tt-pc-top">
                                                                                            <span class="tt-pc-num tt-pc-num-sub">P{p.periodNumber}</span>
                                                                                            <span class="tt-pc-time">{p.timeLabel}</span>
                                                                                        </div>
                                                                                        <div class="tt-pc-subject tt-pc-subject-sub">{p.subjectName}</div>
                                                                                        <div class="tt-pc-teacher sub-covering-row">
                                                                                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                                                                            {p.substituteTeacher}
                                                                                        </div>
                                                                                        <template if:true={p.originalTeacher}>
                                                                                            <div class="sub-original-teacher">
                                                                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                                                                On leave: {p.originalTeacher}
                                                                                            </div>
                                                                                        </template>
                                                                                        <div class="tt-pc-edit-hint tt-pc-edit-hint-green">✏ Edit</div>
                                                                                    </div>
                                                                                </template>

                                                                                <template if:false={p.isSubstitute}>
                                                                                    <div key={p.key}
                                                                                         class="tt-period-card tt-period-card-green tt-period-card-clickable"
                                                                                         onclick={handlePeriodCardClick}
                                                                                         data-class-section-id={p.classSectionId}
                                                                                         data-academic-year-id={p.academicYearId}
                                                                                         data-start-date={p.startDate}
                                                                                         data-end-date={p.endDate}
                                                                                         data-frequency={p.frequency}
                                                                                         title="Click to edit timetable">
                                                                                        <div class="tt-pc-top">
                                                                                            <span class="tt-pc-num">P{p.periodNumber}</span>
                                                                                            <span class="tt-pc-time">{p.timeLabel}</span>
                                                                                        </div>
                                                                                        <div class="tt-pc-subject">{p.subjectName}</div>
                                                                                        <div class="tt-pc-teacher">
                                                                                            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                                                                            {p.teacherName}
                                                                                        </div>
                                                                                        <div class="tt-pc-edit-hint tt-pc-edit-hint-green">✏ Edit</div>
                                                                                    </div>
                                                                                </template>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </template>
                                                            <!-- /Today's Schedule body for class -->

                                                        </div>
                                                    </template>
                                                    <template if:false={selectedClassDetail.hasTimetable}>
                                                        <div class="tt-drawer-empty tt-drawer-empty-green">
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                                            <span>No timetable periods scheduled yet</span>
                                                        </div>
                                                    </template>

                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </template>
                                <template if:false={hasClassWorkload}>
                                    <div class="panel-empty">
                                        <div class="pe-emoji">📚</div>
                                        <p class="pe-text">No class sections yet</p>
                                        <p class="pe-hint">Click "Add Class Section" to get started</p>
                                    </div>
                                </template>
                            </div>
                        </div>

                    </div><!-- /dual-panel -->
                </template>

                <!-- Teacher Form -->
                <template if:true={showTeacherForm}>
                    <div class="section-card">
                        <div class="section-header">
                            <h2 class="section-title">Add New Teacher</h2>
                            <p class="section-subtitle">Create a teacher profile with subject skills</p>
                        </div>
                        <div class="teacher-form-container">
                            <div class="form-section">
                                <h3 class="form-section-title">Personal Information</h3>
                                <div class="form-grid">
                                    <div class="form-group"><lightning-input name="firstName" label="First Name" value={teacherFirstName} placeholder="e.g., John" onchange={handleTeacherFirstNameChange} required class="premium-input"></lightning-input></div>
                                    <div class="form-group"><lightning-input name="lastName" label="Last Name" value={teacherLastName} placeholder="e.g., Smith" onchange={handleTeacherLastNameChange} required class="premium-input"></lightning-input></div>
                                    <div class="form-group"><lightning-input name="email" label="Email" type="email" value={teacherEmail} placeholder="e.g., john.smith@school.com" onchange={handleTeacherEmailChange} required class="premium-input"></lightning-input></div>
                                    <div class="form-group"><lightning-input name="phone" label="Phone" type="tel" value={teacherPhone} placeholder="e.g., +91 98765 43210" onchange={handleTeacherPhoneChange} class="premium-input"></lightning-input></div>
                                </div>
                                <div class="form-group full-width"><lightning-textarea name="qualification" label="Qualification" value={teacherQualification} placeholder="e.g., M.Ed, B.Ed in English Literature" onchange={handleTeacherQualificationChange} class="premium-input"></lightning-textarea></div>
                            </div>
                            <div class="form-section">
                                <div class="section-header-with-button">
                                    <h3 class="form-section-title">Subject Skills</h3>
                                    <lightning-button label="Add Subject Skill" icon-name="utility:add" onclick={handleAddSkill} variant="brand-outline" class="add-skill-button"></lightning-button>
                                </div>
                                <template if:true={hasTeacherSkills}>
                                    <div class="skills-container">
                                        <template for:each={teacherSkills} for:item="skill">
                                            <div key={skill.id} class="skill-card">
                                                <div class="skill-header">
                                                    <span class="skill-number">Skill #{skill.id}</span>
                                                    <lightning-button-icon icon-name="utility:delete" variant="bare" alternative-text="Remove skill" data-skill-id={skill.id} onclick={handleRemoveSkill} class="delete-skill-btn"></lightning-button-icon>
                                                </div>
                                                <div class="skill-fields">
                                                    <div class="skill-field">
                                                        <div class="slds-grid slds-grid_vertical-align-center slds-nowrap">
                                                            <div class="slds-grow">
                                                                <lightning-combobox name="subject" label="Subject" value={skill.subjectId} placeholder="Select Subject" options={availableSubjects} data-skill-id={skill.id} onchange={handleSkillSubjectChange} required class="premium-input"></lightning-combobox>
                                                            </div>
                                                            <div class="slds-p-left_xx-small slds-no-flex" style="padding-top: 20px;">
                                                                <lightning-button-icon icon-name="utility:add" variant="border-filled" size="medium" onclick={handleOpenImportSubjects} alternative-text="Add Subject" title="Add Subject"></lightning-button-icon>
                                                            </div>
                                                        </div>
                                                        
                                                     </div>
                                                    <div class="skill-field"><lightning-combobox name="skillLevel" label="Skill Level" value={skill.skillLevel} placeholder="Select Level" options={skillLevelOptions} data-skill-id={skill.id} onchange={handleSkillLevelChange} required class="premium-input"></lightning-combobox></div>
                                                    <div class="skill-field"><lightning-input name="experience" label="Years of Experience" type="number" value={skill.yearsOfExperience} min="0" max="50" step="0.5" placeholder="e.g., 5" data-skill-id={skill.id} onchange={handleSkillExperienceChange} class="premium-input"></lightning-input></div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasTeacherSkills}>
                                    <div class="empty-skills-state"><lightning-icon icon-name="utility:info" size="small" variant="warning"></lightning-icon><p>No skills added yet. Click "Add Subject Skill" to begin.</p></div>
                                </template>
                            </div>
                            <div class="teacher-form-actions">
                                <lightning-button label="Cancel" onclick={handleToggleTeacherForm} icon-name="utility:close" class="secondary-button"></lightning-button>
                                <lightning-button label="Create Teacher &amp; Continue" variant="brand" onclick={handleCreateTeacher} icon-name="utility:save" icon-position="right" class="submit-button"></lightning-button>
                            </div>
                        </div>
                    </div>
                </template>
            </template>

            <!-- STEP 1 -->
            <template if:true={isStep1}>
                <div class="section-card">
                    <div class="section-header"><h2 class="section-title">Create New Class Section</h2><p class="section-subtitle">Select academic year, class and section</p></div>
                    <div class="form-grid">
                        <div class="form-group"><lightning-combobox name="academicYear" label="Academic Year" value={selectedAcademicYear} placeholder="Select Academic Year" options={academicYearOptions} onchange={handleAcademicYearChange} required class="premium-input"></lightning-combobox></div>
                        <div class="form-group">
                            <div class="slds-grid slds-grid_vertical-align-center slds-nowrap">
                                <div class="slds-grow">
                                    <lightning-combobox name="class" label="Class" value={selectedClassId} placeholder="Select Class" options={classOptions} onchange={handleClassChange} required class="premium-input"></lightning-combobox>
                                </div>
                                <div class="slds-p-left_xx-small slds-no-flex" style="padding-top: 20px;">
                                    <lightning-button-icon icon-name="utility:add" variant="border-filled" size="medium" onclick={handleToggleInlineAddClass} alternative-text="Add Class Inline" title="Add Class Inline"></lightning-button-icon>
                                </div>
                            </div>
                            <template if:true={showInlineAddClass}>
                                <div class="slds-grid slds-grid_vertical-align-center slds-m-top_xx-small">
                                    <div class="slds-grow">
                                        <lightning-input name="newClassNameInline" type="text" placeholder="New class name..." value={newClassNameInline} onchange={handleNewClassNameInlineChange} class="premium-input"></lightning-input>
                                    </div>
                                    <div class="slds-p-left_xx-small slds-no-flex">
                                        <lightning-button-icon icon-name="utility:check" variant="border-filled" size="small" onclick={handleSaveNewClassInline} alternative-text="Save" title="Save" class="slds-m-right_xx-small"></lightning-button-icon>
                                        <lightning-button-icon icon-name="utility:close" variant="bare" size="small" onclick={handleToggleInlineAddClass} alternative-text="Cancel" title="Cancel"></lightning-button-icon>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="form-group"><lightning-combobox name="section" label="Section" value={selectedSectionId} placeholder="Select Section" options={sectionOptions} onchange={handleSectionChange} required class="premium-input"></lightning-combobox></div>
                        <div class="form-group"><lightning-input name="classStrength" label="Class Strength (Optional)" type="number" value={classStrength} placeholder="e.g., 40" onchange={handleClassStrengthChange} class="premium-input"></lightning-input></div>
                    </div>
                    <template if:true={showDuplicateWarning}><div class="duplicate-warning"><lightning-icon icon-name="utility:warning" size="small" variant="warning"></lightning-icon><span>{duplicateWarningMessage}</span></div></template>
                    <div class="button-group">
                        <lightning-button label="Back" onclick={handleStep1Back} icon-name="utility:back" class="secondary-button"></lightning-button>
                        <lightning-button label="Next: Select Subjects" variant="brand" onclick={handleStep1Next} icon-name="utility:forward" icon-position="right" class="premium-button"></lightning-button>
                    </div>
                </div>
            </template>

            <!-- STEP 2 -->
            <template if:true={isStep2}>
                <div class="section-card">
                    <div class="section-header"><h2 class="section-title">Select Subjects</h2><p class="section-subtitle">Choose subjects for {selectedClassName} — Section {selectedSectionName}</p></div>
                    <div class="search-container"><lightning-input type="search" placeholder="Search subjects..." value={subjectSearchTerm} onchange={handleSubjectSearch} class="search-input"></lightning-input></div>
                    <template if:true={hasSelectedSubjects}>
                        <div class="selected-subjects-container">
                            <div class="selected-header"><lightning-icon icon-name="utility:check" size="x-small"></lightning-icon><span class="selected-count">{selectedSubjectsCount} Subject(s) Selected</span></div>
                            <div class="pill-container">
                                <template for:each={selectedSubjectsList} for:item="subject">
                                    <div key={subject.Id} class="subject-pill"><span class="pill-text">{subject.Name}</span><lightning-button-icon icon-name="utility:close" variant="bare" alternative-text="Remove" data-id={subject.Id} onclick={handleRemoveSubject} class="pill-remove"></lightning-button-icon></div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <div class="subject-grid">
                        <template for:each={filteredSubjects} for:item="subject">
                            <div key={subject.Id} class={subject.cardClass} onclick={handleSubjectToggle} data-id={subject.Id}>
                                <div class="subject-card-header"><div class="checkbox-container"><lightning-input type="checkbox" checked={subject.isSelected} data-id={subject.Id} variant="label-hidden" onclick={handleSubjectToggle}></lightning-input></div><lightning-icon icon-name="standard:topic" size="small"></lightning-icon></div>
                                <div class="subject-card-body"><h3 class="subject-name">{subject.Name}</h3><template if:true={subject.Subject_Code__c}><p class="subject-code">{subject.Subject_Code__c}</p></template><template if:true={subject.Description__c}><p class="subject-description">{subject.Description__c}</p></template></div>
                            </div>
                        </template>
                    </div>
                    <template if:true={noSubjectsFound}><div class="empty-state"><lightning-icon icon-name="utility:search" size="large" class="empty-icon"></lightning-icon><p class="empty-text">No subjects found</p></div></template>
                    <div class="button-group">
                        <lightning-button label="Back" onclick={handleStep2Back} icon-name="utility:back" class="secondary-button"></lightning-button>
                        <lightning-button label="Next: Assign Teachers" variant="brand" onclick={handleStep2Next} icon-name="utility:forward" icon-position="right" disabled={isStep2NextDisabled} class="premium-button"></lightning-button>
                    </div>
                </div>
            </template>

            <!-- STEP 3 -->
            <template if:true={isStep3}>
                <div class="section-card">
                    <div class="section-header"><h2 class="section-title">Assign Teachers</h2><p class="section-subtitle">Assign qualified teachers to each selected subject</p></div>
                    <div class="assignment-container">
                        <template for:each={teacherAssignments} for:item="assignment">
                            <div key={assignment.subjectId} class="assignment-card">
                                <div class="assignment-header">
                                    <div class="assignment-subject"><lightning-icon icon-name="standard:topic" size="small"></lightning-icon><h3 class="assignment-subject-name">{assignment.subjectName}</h3></div>
                                    <template if:true={assignment.hasError}><lightning-badge label="Required" class="error-badge"></lightning-badge></template>
                                </div>
                                <div class="teacher-selection">
