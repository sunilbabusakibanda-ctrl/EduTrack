            <p class="slds-text-body_small slds-m-bottom_medium"><strong>Last Updated: June 3, 2025</strong></p>

            <p class="slds-m-bottom_small">Covenant Synergy ("us", "we", or "our") operates the website covenantsynergy.in (the "Site") and provides Salesforce administration, development, and consulting services (the "Services"). This page informs you of our policies regarding the collection, use, and disclosure of personal data when you use our Site and Services and the choices you have associated with that data.</p>

            <p class="slds-m-bottom_medium">We are committed to protecting your privacy and handling your data in an open and transparent manner. We use your data to provide and improve our Services. By using the Site or engaging our Services, you agree to the collection and use of information in accordance with this policy.</p>

            <h2 class="slds-text-heading_medium slds-m-top_large slds-m-bottom_small">1. Definitions</h2>

                <li><strong>Client Data:</strong> Data, including Personal Data, that our clients store or process within their Salesforce instances or other systems to which we are granted access in order to provide our Services.</li>
                <li><strong>Usage Data:</strong> Data collected automatically, either generated by the use of the Site or from the Site infrastructure itself (for example, the duration of a page visit).</li>
                <li><strong>Cookies:</strong> Small files stored on your device (computer or mobile device).</li>
                <li><strong>Data Controller:</strong> The natural or legal person who (either alone or jointly or in common with other persons) determines the purposes for which and the manner in which any personal information are, or are to be, processed. For the purpose of this Privacy Policy, Covenant Synergy may be a Data Controller of your Personal Data collected through the Site.</li>
                <li><strong>Data Processor:</strong> Any natural or legal person who processes data on behalf of the Data Controller. In the context of our Services, Covenant Synergy acts as a Data Processor for Client Data. Our clients are the Data Controllers of their Client Data.</li>
            </ul>

            <h2 class="slds-text-heading_medium slds-m-top_large slds-m-bottom_small">2. Information Collection and Use</h2>

            <h2 class="slds-text-heading_medium slds-m-top_large slds-m-bottom_small">5. Data Security</h2>
            <p class="slds-m-bottom_small">The security of your data is important to us. We implement and maintain reasonable and appropriate technical and organizational security measures designed to protect the Personal Data and Client Data we process against unauthorized access, disclosure, alteration, or destruction. These measures include, but are not limited to:</p>

            <p class="slds-m-bottom_small">However, remember that no method of transmission over the Internet or method of electronic storage is 100% secure. While we strive to use commercially acceptable means to protect your Personal Data and Client Data, we cannot guarantee its absolute security.</p>

            <h2 class="slds-text-heading_medium slds-m-top_large slds-m-bottom_small">7. Your Data Protection Rights</h2>

                <li><strong>The right to object to processing:</strong> You have the right to object to our processing of your Personal Data, under certain conditions.</li>
                <li><strong>The right to data portability:</strong> You have the right to request that we transfer the data that we have collected to another organization, or directly to you, under certain conditions.</li>
